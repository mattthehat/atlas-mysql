name: Publish to npm

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      # NOTE: no `registry-url:` here on purpose. setup-node's registry-url writes an
      # .npmrc with a placeholder _authToken, which makes npm attempt (failing) token
      # auth instead of the OIDC trusted-publisher exchange. npmjs.org is the default
      # registry, so OIDC works without it.
      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      # Ensure npm supports OIDC trusted publishing (>= 11.5.1)
      - run: npm install -g npm@latest

      - run: npm ci

      - run: npm run test:ci

      - run: npm run clean && npm run build

      # Auth handled by the OIDC trusted publisher (mattthehat/atlas-mysql -> publish.yml).
      # Publishing without --provenance to isolate whether provenance is the 403 cause.
      - run: npm publish --access public
