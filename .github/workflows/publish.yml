name: Publish to npm

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      # NOTE: no `registry-url:` here on purpose. setup-node's registry-url writes an
      # .npmrc with a placeholder _authToken, which makes npm attempt (failing) token
      # auth instead of the OIDC trusted-publisher exchange. npmjs.org is the default
      # registry, so OIDC works without it.
      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      # Ensure npm supports OIDC trusted publishing (>= 11.5.1)
      - run: npm install -g npm@latest

      - run: npm ci

      - run: npm run test:ci

      - run: npm run clean && npm run build

      # Capture the REAL registry 403 body that npm hides, by replicating the
      # OIDC exchange + PUT with curl.
      - name: Diagnose publish 403 body
        run: |
          IDTOKEN=$(curl -s -H "authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "$ACTIONS_ID_TOKEN_REQUEST_URL&audience=npm:registry.npmjs.org" | jq -r .value)
          echo "id token: ${IDTOKEN:+ok}"
          NPMTOKEN=$(curl -s -X POST -H "authorization: Bearer $IDTOKEN" \
            https://registry.npmjs.org/-/npm/v1/oidc/token/exchange/package/atlas-mysql | jq -r .token)
          echo "npm oidc token: ${NPMTOKEN:+ok}"
          echo "==== real PUT response body ===="
          curl -s -X PUT -H "authorization: Bearer $NPMTOKEN" -H 'content-type: application/json' \
            https://registry.npmjs.org/atlas-mysql --data '{"_id":"atlas-mysql","name":"atlas-mysql"}'
          echo
